<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Commando — Real-Time Pentesting Command Compiler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f3ee;--text:#3d3a35;--muted:#8a8478;--border:#d6d1c4;--accent:#1b4332;--accent-light:#2d6a4f;--card:#ffffff;--code-bg:#1a1a1a;--code-text:#e0ddd5;--hover:#eae7df;--sidebar-w:220px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;overflow-y:auto;z-index:10;transition:transform .25s ease}
#sidebar.collapsed{transform:translateX(calc(var(--sidebar-w)*-1))}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent)}
.sidebar-header p{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.5px}
.sidebar-section{padding:12px 0}
.sidebar-section-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 20px 8px}
.tool-btn{display:block;width:100%;padding:9px 20px;border:none;background:none;text-align:left;font-size:12.5px;color:var(--text);cursor:pointer;transition:all .12s;font-family:inherit;letter-spacing:.2px}
.tool-btn:hover{background:var(--hover);color:var(--accent)}
.tool-btn.active{background:var(--accent);color:#fff;font-weight:600}
#main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;transition:margin .25s ease;min-width:0}
#main.expanded{margin-left:0}
#toggle-btn{position:fixed;top:12px;left:12px;z-index:20;background:var(--accent);color:#fff;border:none;border-radius:4px;width:34px;height:34px;cursor:pointer;font-size:15px;display:none;font-family:inherit}
#sidebar.collapsed~#main #toggle-btn{display:flex;align-items:center;justify-content:center}
#context-bar{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--border);padding:16px 28px}
.ctx-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.ctx-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.ctx-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px}
.ctx-field span{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.ctx-field input[type="text"]{padding:9px 12px;border:1px solid var(--border);border-radius:5px;font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:border .15s}
.ctx-field input[type="text"]:focus{border-color:var(--accent)}
.file-pick{display:flex;align-items:center;gap:10px}
.file-pick label{padding:9px 16px;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px;background:var(--bg);color:var(--text);font-weight:500;transition:border .15s;white-space:nowrap}
.file-pick label:hover{border-color:var(--accent)}
.file-pick .filename{font-size:11px;color:var(--accent);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#search-bar{padding:10px 28px;background:var(--card);border-bottom:1px solid var(--border)}
#search-bar input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:5px;font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:border .15s}
#search-bar input:focus{border-color:var(--accent)}
#search-bar input::placeholder{color:var(--muted)}
#workspace{padding:24px 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:16px;overflow-y:auto;flex:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card-head{padding:11px 16px;font-size:11px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;letter-spacing:.3px;text-transform:uppercase}
.card-tag{font-size:9px;padding:2px 8px;border-radius:3px;background:var(--bg);color:var(--muted);font-weight:600;letter-spacing:.5px}
.card-body{position:relative;background:var(--code-bg);padding:14px 16px;padding-right:70px}
.card-body pre{font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-all;color:var(--code-text);outline:none;min-height:20px;cursor:text;border:1px solid transparent;border-radius:3px;padding:2px 4px;margin:-2px -4px;transition:border .15s}
.card-body pre:focus{border-color:#2d6a4f}
.copy-btn{position:absolute;top:10px;right:10px;background:transparent;color:#777;border:1px solid #444;border-radius:4px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.copy-btn:hover{color:#ccc;border-color:#888}
.copy-btn.copied{color:#2d6a4f;border-color:#2d6a4f}
.card-desc{padding:10px 16px;font-size:11.5px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border);background:var(--bg)}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
@media(max-width:768px){
#sidebar{position:fixed;z-index:20}
#main{margin-left:0!important}
#toggle-btn{display:flex!important;align-items:center;justify-content:center}
#workspace{grid-template-columns:1fr;padding:16px}
.ctx-row{flex-direction:column}
.ctx-field{min-width:0}
}
</style>

</head>

<div id="main">
<button id="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed');document.getElementById('main').classList.toggle('expanded')">&#9776;</button>
<div id="context-bar">

<div class="ctx-field">

<input type="text" id="v-target" placeholder="e.g. 10.10.10.25 or target.com" oninput="render()">

<label>Browse<input type="file" style="display:none" onchange="pickFile(this)"></label>

</div>

</div>
